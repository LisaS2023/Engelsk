<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Search Studio – A1–A2</title>

<style>
:root{
  --teal:#88C7C1;
  --sand:#FACA78;
  --coral:#F57F5B;
  --red:#DD5341;
  --brown:#794A3A;

  --bg:#fffaf5;
  --panel:#ffffff;
  --text:#2f2230;
  --muted:#705d63;
  --line:#ecdeda;

  --accent:var(--red);
  --accent-soft:#ffe9e6;
  --success:#4da48a;
  --success-soft:#e8f6f2;
}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.shell{max-width:1200px;margin:auto;padding:24px}

.hero{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

.hero img{
  width:100%;
  border-radius:20px;
  object-fit:cover;
}

/* GRID */
.grid{display:grid;gap:4px;margin-top:20px}
.cell{
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line);
  background:white;
  cursor:pointer;
}
.cell.selecting{background:var(--accent-soft)}
.cell.found{background:var(--success-soft)}

.word-list{
  margin-top:16px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.word-chip{
  padding:6px 10px;
  border-radius:10px;
  border:1px solid var(--line);
}

.topic-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:16px;
}
.topic-btn{
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:white;
  cursor:pointer;
}
.topic-btn.active{background:var(--accent-soft)}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:var(--red);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="shell">

<div class="hero">
<div>
<h1>Interactive vocabulary puzzles</h1>
<p>Choose level and topic, then find the words.</p>

<button onclick="setLevel('A1')">A1</button>
<button onclick="setLevel('A2')">A2</button>
</div>

<div>
<img src="data:image/png;base64,PASTE_YOUR_BASE64_HERE">
</div>
</div>

<h2 id="title"></h2>
<div id="topics" class="topic-grid"></div>
<div id="grid" class="grid"></div>
<div id="words" class="word-list"></div>

</div>

<script>
const WORD_BANK = {
A1:{
daily:["WAKE","EAT","DRINK","HOME","BUS","BOOK","BED","DAY"],
school:["TEACHER","PEN","DESK","READ","WRITE","CLASS","TASK","LEARN"],
food:["APPLE","BREAD","MILK","RICE","FISH","EGG","CAKE","SHOP"],
home:["ROOM","DOOR","TABLE","CHAIR","WINDOW","LIGHT","SOFA","HOUSE"],
people:["MOTHER","FATHER","FRIEND","BABY","STUDENT","FAMILY","PERSON","CHILD"]
},
A2:{
travel:["AIRPORT","TICKET","HOTEL","PASSPORT","FLIGHT","TRAIN","JOURNEY","TRAVEL"],
health:["DOCTOR","MEDICINE","PAIN","FEVER","NURSE","CLINIC","SICK","COUGH"],
shopping:["PRICE","PAYMENT","CUSTOMER","MARKET","RETURN","PRODUCT","SIZE","CHEAP"],
directions:["LEFT","RIGHT","STRAIGHT","CORNER","ACROSS","BETWEEN","NEAR","BRIDGE"],
free:["MUSIC","CINEMA","WEEKEND","FRIENDS","SPORT","READING","DRAWING","RELAX"]
}
};

let level="A1";
let topic="daily";
let grid=[];

function setLevel(l){
level=l;
topic=Object.keys(WORD_BANK[l])[0];
renderTopics();
newPuzzle();
}

function renderTopics(){
const t=document.getElementById("topics");
t.innerHTML="";
Object.keys(WORD_BANK[level]).forEach(k=>{
const btn=document.createElement("button");
btn.className="topic-btn"+(k===topic?" active":"");
btn.textContent=k;
btn.onclick=()=>{
topic=k;
renderTopics();
newPuzzle();
};
t.appendChild(btn);
});
}

function newPuzzle(){
const words=WORD_BANK[level][topic];
grid=Array.from({length:10},()=>Array.from({length:10},()=>rand()));

words.forEach(w=>{
let r=Math.floor(Math.random()*10);
let c=Math.floor(Math.random()*3);
for(let i=0;i<w.length;i++){
grid[r][c+i]=w[i];
}
});

render(words);
}

function rand(){
return "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];
}

function render(words){
const g=document.getElementById("grid");
g.innerHTML="";
g.style.gridTemplateColumns="repeat(10,34px)";

grid.forEach((row,r)=>row.forEach((l,c)=>{
const d=document.createElement("div");
d.className="cell";
d.textContent=l;
g.appendChild(d);
}));

const w=document.getElementById("words");
w.innerHTML="";
words.forEach(word=>{
const d=document.createElement("div");
d.className="word-chip";
d.textContent=word;
w.appendChild(d);
});

document.getElementById("title").textContent=level+" • "+topic;
}

setLevel("A1");
</script>

</body>
</html>
